version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: koubou-pos-db-prod
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: koubou_pos
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U postgres' ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pos-network

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: koubou-pos-api-prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-postgres}@db:5432/koubou_pos
      - CORS_ORIGIN=${CORS_ORIGIN:-*} # Nginx proxy ensures same-origin for browser, so API can accept requests from Nginx
      - JWT_SECRET=${JWT_SECRET:-your_super_secret_jwt_key_here}
      # Add other necessary production variables here (like PAYPAY_API_KEY)
      # - PAYPAY_API_KEY=${PAYPAY_API_KEY}
    networks:
      - pos-network

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: koubou-pos-web-prod
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - api
    networks:
      - pos-network

volumes:
  postgres_data_prod:
    driver: local

networks:
  pos-network:
    driver: bridge
